name: b_selfcare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  intl_utils: ^2.8.14
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  flutter_easyloading: ^3.0.5
  toastification: ^3.0.3
  url_strategy: ^0.3.0
  auto_route: ^11.1.0
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  dartz: ^0.10.1
  universal_html: ^2.3.0




  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  build_runner: ^2.13.1
  flutter_gen_runner: ^5.13.0+1
  injectable_generator: ^2.12.1
  auto_route_generator: ^10.5.0

  


  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/logo/
  #   - assets/icons/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/static/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat/static/Montserrat-Italic.ttf
          style: italic
        - asset: assets/fonts/Montserrat/static/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat/static/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat/static/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat/static/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat/static/Montserrat-Black.ttf
          weight: 900

    - family: Syne
      fonts:
        - asset: assets/fonts/Syne/static/Syne-Regular.ttf
        - asset: assets/fonts/Syne/static/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne/static/Syne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Syne/static/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne/static/Syne-ExtraBold.ttf
          weight: 800




flutter_intl:
  main_locale: fr  # Changé en français pour que les valeurs par défaut soient en français
  class_name: S
  enabled: true


flutter_gen:
  output: lib/gen/
  line_length: 80

  integrations:
    lottie: true

  assets:
    enabled: true

    outputs:
      class_name: Assets
      package_parameter_enabled: false

      style: dot-delimiter

    exclude:
      - assets/logo/
      - assets/icons/
      - assets/images/
